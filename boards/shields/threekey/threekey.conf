# USB Only Mode
CONFIG_ZMK_USB=y
CONFIG_ZMK_BLE=n

# Enable ZMK Studio
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n

# RGB Underglow (WS2812)
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y
CONFIG_SPI=y
CONFIG_ZMK_RGB_UNDERGLOW_ON_START=y
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=0
CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=0
CONFIG_ZMK_RGB_UNDERGLOW_SAT_START=100
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=50
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_USB=-1
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=-1

# Enable full consumer HID report (volume, media keys, etc.)
CONFIG_ZMK_HID_CONSUMER_REPORT_USAGES_FULL=y
